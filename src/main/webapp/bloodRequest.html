<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Request — Blood Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --crimson:   #C0152A;
      --crimson-dk:#8B0E1E;
      --crimson-lt:#FFE4E4;
      --bg:        #FFF8F8;
      --surface:   #FFFFFF;
      --text:      #1A0A0B;
      --muted:     #6B7280;
      --border:    #F0D0D0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .page-header { text-align: center; margin-bottom: 36px; }
    .page-header .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--crimson);
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .page-header p { color: var(--muted); font-size: .93rem; }

    .request-card {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(192,21,42,.10);
      border-top: 5px solid var(--crimson);
      padding: 40px 40px 36px;
    }

    .field-label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
    }

    /* Blood type grid - identical layout to register */
    .blood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }
    .blood-option { display: none; }
    .blood-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      transition: all .15s;
      background: var(--bg);
    }
    .blood-option:checked + .blood-label {
      border-color: var(--crimson);
      background: var(--crimson);
      color: #fff;
      box-shadow: 0 4px 12px rgba(192,21,42,.30);
    }
    .blood-label:hover {
      border-color: var(--crimson);
      background: var(--crimson-lt);
    }

    .urgency-banner {
      background: var(--crimson-lt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 28px;
      font-size: .88rem;
      color: var(--crimson);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    input[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--crimson);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, transform .12s;
      letter-spacing: .01em;
    }
    input[type="submit"]:hover {
      background: var(--crimson-dk);
      transform: translateY(-1px);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: .9rem;
    }
    .back-link a { color: var(--crimson); font-weight: 600; }

    @media (max-width: 480px) {
      .request-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand">🩸 Blood Bank Management</div>
    <h1>Request Blood</h1>
    <p>Select the blood type you need and submit your request.</p>
  </div>

  <div class="request-card">
    <div class="urgency-banner">
      ⚠️ <span>Please select the correct blood type. Our team will match you with available donors as quickly as possible.</span>
    </div>

    <!-- Action and input names preserved exactly from original -->
    <form name="login" action="request.jsp" method="POST" onsubmit="return validateForm()">
      <span class="field-label">Select Blood Type</span>
      <div class="blood-grid">
        <span><input class="blood-option" type="radio" name="blood" value="A+" id="r-ap"><label class="blood-label" for="r-ap">A+</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="B+" id="r-bp"><label class="blood-label" for="r-bp">B+</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="AB+" id="r-abp"><label class="blood-label" for="r-abp">AB+</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="O+" id="r-op"><label class="blood-label" for="r-op">O+</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="A-" id="r-am"><label class="blood-label" for="r-am">A−</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="B-" id="r-bm"><label class="blood-label" for="r-bm">B−</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="AB-" id="r-abm"><label class="blood-label" for="r-abm">AB−</label></span>
        <span><input class="blood-option" type="radio" name="blood" value="O-" id="r-om"><label class="blood-label" for="r-om">O−</label></span>
      </div>

      <input type="submit" value="Submit Request →" />
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    function validateForm() {
      var blood = document.querySelector('input[name="blood"]:checked');
      if (!blood) {
        alert('Please select a blood type before submitting.');
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
