<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Blood Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --crimson:   #C0152A;
      --crimson-dk:#8B0E1E;
      --crimson-lt:#FFE4E4;
      --bg:        #FFF8F8;
      --surface:   #FFFFFF;
      --text:      #1A0A0B;
      --muted:     #6B7280;
      --border:    #F0D0D0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 16px;
    }
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--crimson);
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .page-header p { color: var(--muted); font-size: .93rem; }

    .form-card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(192,21,42,.10);
      border-top: 5px solid var(--crimson);
      padding: 40px 40px 36px;
    }

    .field-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 15px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--crimson);
      box-shadow: 0 0 0 3px rgba(192,21,42,.12);
    }

    /* Radio group */
    .radio-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .radio-option {
      display: none; /* hide real radio */
    }
    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      transition: all .15s;
      background: var(--bg);
      text-transform: none;
      letter-spacing: 0;
    }
    .radio-option:checked + .radio-label {
      border-color: var(--crimson);
      background: var(--crimson-lt);
      color: var(--crimson);
    }
    .radio-label:hover {
      border-color: var(--crimson);
    }

    /* Blood type grid */
    .blood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 4px;
    }
    .blood-option { display: none; }
    .blood-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 8px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      transition: all .15s;
      background: var(--bg);
      text-align: center;
    }
    .blood-option:checked + .blood-label {
      border-color: var(--crimson);
      background: var(--crimson);
      color: #fff;
    }
    .blood-label:hover {
      border-color: var(--crimson);
      background: var(--crimson-lt);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    input[type="submit"] {
      flex: 2;
      padding: 13px;
      background: var(--crimson);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    input[type="submit"]:hover { background: var(--crimson-dk); }
    input[type="reset"] {
      flex: 1;
      padding: 13px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      cursor: pointer;
      transition: border-color .18s;
    }
    input[type="reset"]:hover { border-color: var(--crimson); color: var(--crimson); }

    .login-link {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: .9rem;
    }
    .login-link a { color: var(--crimson); font-weight: 600; }

    @media (max-width: 480px) {
      .form-card { padding: 28px 20px; }
      .blood-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand">🩸 Blood Bank Management</div>
    <h1>Create Your Account</h1>
    <p>Join our donor network and help save lives.</p>
  </div>

  <div class="form-card">
    <!-- All field names and action preserved exactly from original -->
    <form name="register" action="register.jsp" onsubmit="return validateForm()">

      <div class="field-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" />
      </div>

      <div class="field-group">
        <label for="uname">Username (Email)</label>
        <input type="email" id="uname" name="uname" placeholder="you@example.com" />
      </div>

      <div class="field-group">
        <label for="pwd">Password</label>
        <input type="password" id="pwd" name="pwd" placeholder="Create a password" />
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label>Gender</label>
        <div class="radio-grid">
          <span>
            <input class="radio-option" type="radio" name="gender" value="male" id="g-male" />
            <label class="radio-label" for="g-male">♂ Male</label>
          </span>
          <span>
            <input class="radio-option" type="radio" name="gender" value="female" id="g-female" />
            <label class="radio-label" for="g-female">♀ Female</label>
          </span>
        </div>
      </div>

      <div class="field-group">
        <label>Blood Type</label>
        <div class="blood-grid">
          <span><input class="blood-option" type="radio" name="blood" value="A+" id="b-ap"><label class="blood-label" for="b-ap">A+</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="B+" id="b-bp"><label class="blood-label" for="b-bp">B+</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="AB+" id="b-abp"><label class="blood-label" for="b-abp">AB+</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="O+" id="b-op"><label class="blood-label" for="b-op">O+</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="A-" id="b-am"><label class="blood-label" for="b-am">A−</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="B-" id="b-bm"><label class="blood-label" for="b-bm">B−</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="AB-" id="b-abm"><label class="blood-label" for="b-abm">AB−</label></span>
          <span><input class="blood-option" type="radio" name="blood" value="O-" id="b-om"><label class="blood-label" for="b-om">O−</label></span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label for="addr">Address</label>
        <input type="text" id="addr" name="addr" placeholder="Your address" />
      </div>

      <div class="field-group">
        <label for="phno">Phone Number</label>
        <input type="number" id="phno" name="phno" placeholder="10-digit mobile number" />
      </div>

      <div class="btn-row">
        <input type="submit" value="Create Account" />
        <input type="reset" value="Clear" />
      </div>
    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>

  <script>
    function validateForm() {
      var name  = document.forms['register']['name'].value.trim();
      var uname = document.forms['register']['uname'].value.trim();
      var pwd   = document.forms['register']['pwd'].value;
      var gender = document.querySelector('input[name="gender"]:checked');
      var blood  = document.querySelector('input[name="blood"]:checked');
      var addr  = document.forms['register']['addr'].value.trim();
      var phno  = document.forms['register']['phno'].value.trim();

      if (name === '')                        { alert('Please enter your Name.');           return false; }
      if (uname === '' || !uname.includes('@')) { alert('Please enter a valid Email.');   return false; }
      if (pwd === '')                         { alert('Please enter a Password.');          return false; }
      if (!gender)                            { alert('Please select your Gender.');        return false; }
      if (!blood)                             { alert('Please select your Blood Type.');    return false; }
      if (addr === '')                        { alert('Please enter your Address.');        return false; }
      if (phno === '' || isNaN(phno))         { alert('Please enter a valid Phone Number.');return false; }
      return true;
    }
  </script>
</body>
</html>
