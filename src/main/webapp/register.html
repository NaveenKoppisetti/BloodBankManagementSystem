<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1 { text-align: center;}
        form {
            width: 300px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="radio"] {
            margin-right: 10px;
            
        }

        input[type="submit"],
        input[type="reset"] {
            width: 48%;
            padding: 10px;
            background-color: #4caf50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #45a049;
        }

        a {
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Registration Form</h1>
    <form name="register" action="register.jsp" onsubmit="return validateForm()">
        Enter Name: <input type="text" name="name" /><br>
        Enter UserName (Email): <input type="email" name="uname" /><br>
        Enter Password: <input type="password" name="pwd" /><br>
        Choose the Gender:
        <input type="radio" name="gender" value="male" />Male
        <input type="radio" name="gender" value="female" />Female<br>
        Enter Blood Type:<br>
        <input type="radio" name="blood" value="A+" />A+
        <input type="radio" name="blood" value="B+" />B+
        <input type="radio" name="blood" value="AB+" />AB+
        <input type="radio" name="blood" value="O+" />O+<br>
        <input type="radio" name="blood" value="A-" />A-
        <input type="radio" name="blood" value="B-" />B-
        <input type="radio" name="blood" value="AB-" />AB-
        <input type="radio" name="blood" value="O-" />O-<br>
        Enter Address: <input type="text" name="addr" /><br>
        Enter Phone Number: <input type="number" name="phno" /><br>

        <input type="submit" value="Submit" /> <input type="reset" value="Reset" />
        <br>
        <b>If you have an account already, <a href='login.html'>Login</a></b>
    </form>

    <script>
        function validateForm() {
            var name = document.forms['register']['name'].value.trim();
            var uname = document.forms['register']['uname'].value.trim();
            var pwd = document.forms['register']['pwd'].value;
            var gender = document.querySelector('input[name="gender"]:checked');
            var blood = document.querySelector('input[name="blood"]:checked');
            var addr = document.forms['register']['addr'].value.trim();
            var phno = document.forms['register']['phno'].value.trim();

            if (name === '') {
                alert('Please enter Name.');
                return false;
            }

            if (uname === '' || !uname.includes('@')) {
                alert('Please enter a valid UserName (Email).');
                return false;
            }

            if (pwd === '') {
                alert('Please enter a Password.');
                return false;
            }

            if (!gender) {
                alert('Please select a Gender.');
                return false;
            }

            if (!blood) {
                alert('Please select a Blood Type.');
                return false;
            }

            if (addr === '') {
                alert('Please enter Address.');
                return false;
            }

            if (phno === '' || isNaN(phno)) {
                alert('Please enter a valid Phone Number.');
                return false;
            }

            return true; 
        }
    </script>
</body>
</html>
