<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Blood Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --crimson:   #C0152A;
      --crimson-dk:#8B0E1E;
      --crimson-lt:#FFE4E4;
      --bg:        #FFF8F8;
      --surface:   #FFFFFF;
      --text:      #1A0A0B;
      --muted:     #6B7280;
      --border:    #F0D0D0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 16px;
    }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header .brand {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--crimson); font-size: .9rem; font-weight: 600; margin-bottom: 12px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; margin-bottom: 6px;
    }
    .page-header p { color: var(--muted); font-size: .93rem; }

    .layout {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 32px;
      align-items: start;
    }

    /* Info card */
    .info-card {
      background: var(--surface);
      border-radius: 12px;
      border-top: 5px solid var(--crimson);
      box-shadow: 0 4px 20px rgba(192,21,42,.10);
      padding: 32px 28px;
    }
    .info-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .contact-icon {
      width: 36px;
      height: 36px;
      background: var(--crimson-lt);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .contact-item .detail {
      font-size: .82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .contact-item .value {
      font-size: .93rem;
      color: var(--text);
      font-weight: 500;
    }
    .contact-item a { color: var(--crimson); text-decoration: none; }
    .contact-item a:hover { text-decoration: underline; }

    .social-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .social-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: all .15s;
      background: var(--bg);
    }
    .social-btn:hover {
      border-color: var(--crimson);
      background: var(--crimson-lt);
      color: var(--crimson);
      text-decoration: none;
    }

    /* Form card */
    .form-card {
      background: var(--surface);
      border-radius: 12px;
      border-top: 5px solid var(--crimson);
      box-shadow: 0 4px 20px rgba(192,21,42,.10);
      padding: 32px 28px;
    }
    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field-group { margin-bottom: 18px; }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .93rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--crimson);
      box-shadow: 0 0 0 3px rgba(192,21,42,.12);
    }
    textarea { resize: vertical; min-height: 110px; }

    button[type="button"] {
      width: 100%;
      padding: 13px;
      background: var(--crimson);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    button[type="button"]:hover { background: var(--crimson-dk); }

    #response-message {
      text-align: center;
      margin-top: 14px;
      font-size: .9rem;
      color: #1a7a3c;
      font-weight: 600;
      min-height: 20px;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand">🩸 Blood Bank Management</div>
    <h1>Contact Us</h1>
    <p>We're here to help. Reach out and our team will respond promptly.</p>
  </div>

  <div class="layout">

    <!-- Info -->
    <div class="info-card">
      <h2>Get In Touch</h2>

      <div class="contact-item">
        <div class="contact-icon">✉</div>
        <div>
          <div class="detail">Email</div>
          <div class="value"><a href="mailto:naveen@gmail.com">koppisettinaveen1432@gmail.com</a></div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">📞</div>
        <div>
          <div class="detail">Phone</div>
          <div class="value"><a href="tel:767">+91-9908170234</a></div>
        </div>
      </div>


      <div class="social-row">
        <a href="https://www.facebook.com/" class="social-btn">📘 Facebook</a>
        <a href="https://instagram.com/" class="social-btn">📸 Instagram</a>
        <a href="https://wa.me/" class="social-btn">💬 WhatsApp</a>
      </div>
    </div>

    <!-- Form -->
    <div class="form-card">
      <h2>Send a Message</h2>
      <!-- Field names preserved exactly from original -->
      <form id="contact-form">
        <div class="field-group">
          <label for="cnt-name">Your Name</label>
          <input type="text" id="cnt-name" name="name" placeholder="Full name" required>
        </div>
        <div class="field-group">
          <label for="cnt-email">Email</label>
          <input type="email" id="cnt-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field-group">
          <label for="cnt-subject">Subject</label>
          <input type="text" id="cnt-subject" name="subject" placeholder="How can we help?" required>
        </div>
        <div class="field-group">
          <label for="cnt-msg">Message</label>
          <textarea id="cnt-msg" name="message" rows="4" placeholder="Your message..." required></textarea>
        </div>
        <button type="button" onclick="sendMessage()">Send Message →</button>
        <div id="response-message"></div>
      </form>
    </div>

  </div>

  <div style="text-align:center; margin-top:32px;">
    <a href="index.html" style="color:var(--crimson); font-weight:600; font-size:.9rem;">← Back to Home</a>
  </div>

  <script>
    function sendMessage() {
      const fields = ['name','email','subject','message'];
      for (const f of fields) {
        if (!document.getElementById('contact-form').elements[f].value.trim()) {
          alert('Please fill in all fields.');
          return;
        }
      }
      document.getElementById('response-message').innerText = '✓ Message sent successfully!';
    }
  </script>
</body>
</html>
