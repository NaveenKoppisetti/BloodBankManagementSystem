<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
    <style>
   
    body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
 header {
            background-color: #87CEEB;
            color: white;
            text-align: center;
            padding: 2em;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .address {
            text-align: left;
            margin-bottom: 20px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 30px;
            height: 30px;
            margin: 0 10px;
        }
        a{
        color: white;
        text-decoration:none;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            background-color: #4caf50;
            color: #fff;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .declaration {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Us</h1>

        <img src="contact.jpg" alt="agriculture">

        <div class="address">
            <p>CONTACK VIA MAIL:</p>
            <p>naveen@gmail.com</p>
        </div>

        <div class="logo-container">
            <a href="https://www.facebook.com/.1?sfnsn=wiwspwa&mibextid=MUfG1I">
                <img src="face.png" alt="Facebook Logo"></a>
                <a href="https://instagram.com/18?igshid=OGQ5ZDc2ODk2ZA==">
                <img src="insta.jpg" alt="Instagram Logo"></a>
                <a href="https://wa">
                <img src="what.png" alt="WhatsApp Logo"></a>
                <a href="tel:767">
                <img src="phone.png" alt="Phone Logo"></a>
            </div>

        <form id="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="text" name="subject" placeholder="Subject" required>
            <textarea name="message" placeholder="Your Message" rows="4" required></textarea>
            <button type="button" onclick="sendMessage()">Send Message</button>
        </form>

        <div class="declaration">
            <p id="response-message"></p>
        </div>
    </div>

    <script>
        function sendMessage() {
          
            document.getElementById('response-message').innerText = 'Message sent successfully!';
        }
    </script>
</body>
</html>
