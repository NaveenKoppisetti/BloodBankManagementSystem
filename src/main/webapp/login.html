<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

h1 {
    text-align: center;
}

form {
    width: 300px;
    margin: 0 auto;
    background-color: #fff;
    padding: 20px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.button-container {
    display: flex;
    justify-content: space-between;
}

input[type="Submit"],
input[type="Reset"] {
    width: 48%; 
    padding: 10px;
    background-color: #4caf50;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

input[type="Submit"]:hover,
input[type="Reset"]:hover {
    background-color: #45a049;
}

h4 {
    text-align: center;
    margin-top: 20px;
}

a {
    color: #007bff;
}

    <script>
        function validateForm() {
            var uname = document.forms['login']['uname'].value.trim();
            var pwd = document.forms['login']['pwd'].value.trim();

            if (uname === '' || pwd === '') {
                alert('Please enter both username and password.');
                return false; 
            }

            return true;
        }
    </script>
</head>

<body background="login.jpg">
    <h1>Login Form</h1>
    <form name="login" action="login.jsp" method="POST" onsubmit="return validateForm()">
        ENTER USERNAME:<input type="text" name="uname" /><br>
        ENTER PASSWORD:<input type="password" name="pwd" /><br>
        
        <!-- Container for buttons -->
        <div class="button-container">
            <input type="Submit" value="Submit" />
            <input type="Reset" value="Reset" />
        </div>
        
        <h4>click here to <a href="register.html">sign up</a></h4>
    </form>
</body>
</html>
